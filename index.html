<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Dashboard</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace; 
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .corner-widget {
            position: fixed;
            padding: 20px;
        }

        /* LABEL STYLING */
        .label {
            font-size: 20px;
            color: #888;
            margin-bottom: 0px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* PRICE STYLING */
        .price {
            /* MASSIVE FONT SIZE */
            font-size: 96px; 
            font-weight: bold;
            line-height: 1;
            margin-top: -5px; /* Pull price up slightly closer to label */
        }

        /* POSITIONING */
        #top-left { top: 10px; left: 20px; }
        #top-right { top: 10px; right: 20px; text-align: right; }
        #bottom-left { bottom: 10px; left: 20px; }
        #bottom-right { bottom: 10px; right: 20px; text-align: right; }

        .loading { color: #444; font-size: 40px; }
    </style>
</head>
<body>

    <!-- TOP LEFT: NIFTY 50 -->
    <div id="top-left" class="corner-widget">
        <div class="label">Nifty</div>
        <div id="nifty-price" class="price loading">...</div>
    </div>

    <!-- TOP RIGHT: GOLD -->
    <div id="top-right" class="corner-widget">
        <div class="label">Gold</div>
        <div id="gold-price" class="price loading">...</div>
    </div>

    <!-- BOTTOM LEFT: TMB -->
    <div id="bottom-left" class="corner-widget">
        <div class="label">TMB</div>
        <div id="tmb-price" class="price loading">...</div>
    </div>

    <!-- BOTTOM RIGHT: BITCOIN -->
    <div id="bottom-right" class="corner-widget">
        <div class="label">Bitcoin</div>
        <div id="btc-price" class="price loading">...</div>
    </div>

    <script>
        // ---------------------------------------------------------
        // 1. GENERIC FETCH (Yahoo Finance via Proxy)
        // Used for Nifty, Gold, TMB
        // ---------------------------------------------------------
        async function fetchYahooPrice(symbol, elementId, showDecimals) {
            const yahooURL = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d`;
            const proxyURL = 'https://corsproxy.io/?' + encodeURIComponent(yahooURL);

            try {
                const response = await fetch(proxyURL);
                const data = await response.json();
                
                const result = data.chart.result[0];
                const price = result.meta.regularMarketPrice;

                // Formatting: Decimal style (No currency symbol)
                let formatOptions = { style: 'decimal' };

                if (!showDecimals) {
                    formatOptions.maximumFractionDigits = 0;
                    formatOptions.minimumFractionDigits = 0;
                } else {
                    formatOptions.maximumFractionDigits = 2;
                    formatOptions.minimumFractionDigits = 2;
                }
                
                const element = document.getElementById(elementId);
                element.innerText = price.toLocaleString('en-US', formatOptions);
                element.classList.remove('loading');
                
            } catch (error) {
                console.error("Yahoo Error: " + symbol, error);
            }
        }

        // ---------------------------------------------------------
        // 2. SPECIAL FETCH (Binance Direct API)
        // Used specifically for Bitcoin to avoid Proxy/Rate limits
        // ---------------------------------------------------------
        async function fetchBitcoinBinance() {
            // Binance public API (No API Key required for simple price)
            const binanceURL = 'https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT';

            try {
                const response = await fetch(binanceURL);
                const data = await response.json();
                
                // Binance returns price as a string, e.g., "64100.00"
                const price = parseFloat(data.price);

                const element = document.getElementById('btc-price');
                
                // Format: No decimals, No Dollar sign
                element.innerText = price.toLocaleString('en-US', {
                    style: 'decimal',
                    maximumFractionDigits: 0,
                    minimumFractionDigits: 0
                });
                
                element.classList.remove('loading');

            } catch (error) {
                console.error("Binance Error:", error);
                // Fallback: If Binance fails, try the Yahoo method
                fetchYahooPrice('BTC-USD', 'btc-price', false);
            }
        }

        // ---------------------------------------------------------
        // MASTER UPDATE FUNCTION
        // ---------------------------------------------------------
        function updateDashboard() {
            // 1. Nifty (Yahoo)
            fetchYahooPrice('^NSEI', 'nifty-price', false); 
            
            // 2. Gold (Yahoo)
            fetchYahooPrice('GC=F', 'gold-price', false);   
            
            // 3. TMB (Yahoo)
            fetchYahooPrice('TMB.NS', 'tmb-price', true);   
            
            // 4. Bitcoin (Binance Direct)
            fetchBitcoinBinance(); 
        }

        // Run immediately
        updateDashboard();

        // Update every 5 seconds (Binance is fast, so we can update faster if we want, but 5-10s is safe)
        setInterval(updateDashboard, 5000);

    </script>

</body>
</html>
