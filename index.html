<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market</title>
<style>
    /* BASE STYLES */
    body {
        background: #000;
        color: #fff;
        font-family: 'Courier New', monospace;
        margin: 0;
        height: 100vh;
        height: 100dvh; /* Prevents mobile URL bar from cutting off the bottom */
        overflow: hidden;
    }
    .w { padding: 20px; cursor: pointer; user-select: none; }
    .l { font-size: 24px; color: #666; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
    .p { font-size: 96px; font-weight: bold; line-height: 1; transition: color .5s; color: #fff; }
    
    .sm { font-size: 50px; margin-top: 5px; }
    .sub { font-size: 30px; margin-top: 5px; font-weight: normal; opacity: 0.9; }

    .row { display: flex; gap: 40px; }
    .g { color: #0ecb81!important; } 
    .r { color: #f6465d!important; } 
    .y { color: #FFD700!important; }
    
    /* HORIZONTAL LAYOUT (Default Desktop & Landscape) */
    .w { position: fixed; }
    #tl { top: 10px; left: 30px; }
    #tr { top: 10px; right: 30px; text-align: right; }
    #bl { bottom: 10px; left: 30px; }
    #br { bottom: 10px; right: 30px; text-align: right; }
    
    /* Fix subtext alignment based on placement */
    #tl .sub, #bl .sub { text-align: left; }
    #tr .sub, #br .sub { text-align: right; }

    /* VERTICAL LAYOUT (Portrait Mode on Phones) */
    @media (orientation: portrait) {
        body {
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
        }
        .w {
            position: static;
            padding: 0;
            width: 100%;
            text-align: center !important;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* Dynamic viewport width sizing so it never overlaps edges */
        .l { font-size: 5vw; }
        .p { font-size: 16vw; }
        .sm { font-size: 12vw; }
        .sub { font-size: 5vw; text-align: center !important; }
        .row { justify-content: center; gap: 10vw; }
    }

    /* RESPONSIVE LANDSCAPE (For sideways phones so fonts aren't too massive) */
    @media (orientation: landscape) and (max-height: 600px) {
        .w { padding: 15px; }
        .l { font-size: 4vh; }
        .p { font-size: 18vh; }
        .sm { font-size: 12vh; }
        .sub { font-size: 6vh; }
        .row { gap: 4vw; }
    }
</style>
</head>
<body>
    <div id="tl" class="w"><div id="l-tl" class="l">...</div><div id="p-tl" class="p">...</div></div>
    
    <div id="tr" class="w"><div id="l-tr" class="l">Gold</div><div id="p-tr" class="p y">...</div></div>
    
    <div id="bl" class="w">
        <div id="bx-tmb"><div class="l">TMB</div><div id="p-tmb" class="p">...</div></div>
        <div id="bx-yld" class="row" style="display:none">
            <div><div class="l">10Y</div><div id="p-10" class="p sm">...</div></div>
            <div><div class="l">30Y</div><div id="p-30" class="p sm">...</div></div>
        </div>
    </div>
    
    <div id="br" class="w"><div id="l-btc" class="l">Bitcoin</div><div id="p-btc" class="p">...</div></div>

<script>
    const H={}, q=i=>document.getElementById(i);
    const P=(i,t,c)=>{let e=q(i);e.innerText=t;if(c)e.className=c;};

    // Wake Lock
    const L=async()=>{try{await navigator.wakeLock.request('screen')}catch(e){}};
    L(); document.addEventListener('visibilitychange',()=>document.visibilityState==='visible'&&L());

    // Yahoo (Args: Symbol, ID, Decimals, SmallFont, FixedColor, Mode: 1=Abs & Pct, 2=Absolute Change)
    async function Y(s, i, dec, sm, fixColor, mode) {
        try {
            let targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${s}?interval=1d&t=${Date.now()}`;
            let r = await fetch('https://corsproxy.io/?' + encodeURIComponent(targetUrl));
            
            let d = await r.json(), M = d.chart.result[0].meta;
            let p = M.regularMarketPrice, prev = M.chartPreviousClose;
            let txt = p.toLocaleString('en-US',{minimumFractionDigits:dec?2:0, maximumFractionDigits:dec?2:0});
            
            if(fixColor) return P(i, txt);

            if(mode) {
                let diff = p - prev;
                let sign = diff >= 0 ? "+" : "";
                let subText = "";
                
                if (mode === 1) {
                    let pct = (diff / prev * 100).toFixed(2);
                    subText = `${sign}${diff.toFixed(2)} (${sign}${pct}%)`;
                } else {
                    subText = `(${sign}${diff.toFixed(2)})`;
                }
                
                q(i).innerHTML = `${txt}<div class="sub">${subText}</div>`;
                q(i).className = `p ${diff >= 0 ? 'g' : 'r'}`;
                return;
            }

            let n = Date.now();
            H[s] = (H[s]||[]).filter(x => n-x.t < 1.2e6); 
            H[s].push({t:n, p});
            let old = H[s].find(x => n-x.t >= 9e5); 
            P(i, txt, `p ${sm?'sm':''} ${p>=(old?old.p:prev) ? 'g' : 'r'}`);
        } catch(e){}
    }

    let mTL = null, mBL = null, mTR = false, mBR = false;
    let btcDom = '...';

    async function getDom(){ 
        try{
            let r = await fetch('https://api.coingecko.com/api/v3/global');
            let data = await r.json();
            btcDom = (parseFloat(data.data.market_cap_percentage.btc) * 1.04325).toFixed(2) + '%';
            if(mBR) P('p-btc', btcDom);
        }catch(e){ console.log("CG Fetch Err", e); } 
    }

    async function B() {
        if (mBR) {
            P('l-btc', 'BTC Dom');
            P('p-btc', btcDom, 'p y');
            return;
        }
        try {
            P('l-btc', 'Bitcoin');
            let [k, t] = await Promise.all([
                fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=16').then(r=>r.json()),
                fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT').then(r=>r.json())
            ]);
            let p = parseFloat(t.price), ref = parseFloat(k[0][4]);
            P('p-btc', Math.round(p).toLocaleString(), `p ${p>ref?'g':'r'}`);
        } catch(e){}
    }

    const getIST = () => {
        let n=new Date(), u=n.getTime()+n.getTimezoneOffset()*6e4+198e5, d=new Date(u);
        let m=d.getHours()*60+d.getMinutes();
        return m>=510&&m<=1080;
    };

    function run() {
        let ist = getIST();
        let stateTL = mTL !== null ? mTL : ist;
        let stateBL = mBL !== null ? mBL : ist;

        P('l-tl', stateTL ? 'Nifty' : 'Nasdaq');
        Y(stateTL ? '^NSEI' : '^IXIC', 'p-tl', 0, 0, 0, 1); 
        
        P('l-tr', mTR ? 'USD/INR' : 'Gold');
        Y(mTR ? 'INR=X' : 'GC=F', 'p-tr', mTR ? 1 : 0, 0, 1);

        q('bx-tmb').style.display = stateBL ? 'block' : 'none';
        q('bx-yld').style.display = stateBL ? 'none' : 'flex';
        
        if(stateBL) Y('TMB.NS', 'p-tmb', 1, 0, 0, 2); 
        else { Y('^TNX', 'p-10', 1, 1, 0); Y('^TYX', 'p-30', 1, 1, 0); }
    }

    q('tl').onclick = () => { mTL = !(mTL !== null ? mTL : getIST()); q('p-tl').innerHTML = '...'; run(); };
    q('tr').onclick = () => { mTR = !mTR; q('p-tr').innerText = '...'; run(); };
    q('bl').onclick = () => { mBL = !(mBL !== null ? mBL : getIST()); q('p-tmb').innerText='...'; q('p-10').innerText='...'; q('p-30').innerText='...'; run(); };
    q('br').onclick = () => { mBR = !mBR; q('p-btc').innerText = '...'; B(); };

    setInterval(run, 30000); run();
    setInterval(B, 1000);    B();
    setInterval(getDom, 30000); getDom(); 
</script>
</body>
</html>
