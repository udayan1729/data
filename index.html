<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Market Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000;
            color: #fff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: sans-serif;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 50% 50%;
            grid-template-rows: 50% 50%;
            height: 100%;
            width: 100%;
            /* No gap implies no grid lines */
            gap: 0; 
        }

        .grid-item {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Hides edges if we zoom in */
            display: flex;
            align-items: center;
            justify-content: center;
            /* Thin border to visually separate logic without heavy grid lines, optional */
            border: 0px solid #000; 
        }

        /* 
           TRICK TO MAKE NUMBERS BIGGER:
           We scale the widget container up by 30%.
           This simulates a larger font size.
        */
        .widget-scaler {
            width: 100%;
            height: 100%;
            transform: scale(1.3); 
            transform-origin: center;
        }

        /* Force Widget to fill space */
        .tradingview-widget-container {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <!-- Top Left -->
        <div class="grid-item">
            <div class="widget-scaler" id="tl-container"></div>
        </div>

        <!-- Top Right -->
        <div class="grid-item">
            <div class="widget-scaler" id="tr-container"></div>
        </div>

        <!-- Bottom Left -->
        <div class="grid-item">
            <div class="widget-scaler" id="bl-container"></div>
        </div>

        <!-- Bottom Right -->
        <div class="grid-item">
            <div class="widget-scaler" id="br-container"></div>
        </div>
    </div>

    <script type="text/javascript">
        function createWidget(containerId, symbol, description) {
            const container = document.getElementById(containerId);
            container.innerHTML = ''; 

            const divContainer = document.createElement('div');
            divContainer.className = 'tradingview-widget-container';
            
            const divWidget = document.createElement('div');
            divWidget.className = 'tradingview-widget-container__widget';
            
            const script = document.createElement('script');
            script.type = 'text/javascript';
            script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js';
            script.async = true;
            
            script.innerHTML = JSON.stringify({
                "symbol": symbol,
                "width": "100%",
                "height": "100%",
                "colorTheme": "dark",
                "isTransparent": true, // Removes widget background box
                "locale": "en",
                "largeChartUrl": "",
                "description": description
            });

            divContainer.appendChild(divWidget);
            divContainer.appendChild(script);
            container.appendChild(divContainer);
        }

        function initDashboard() {
            // Calculate IST Time
            const now = new Date();
            const utcTime = now.getTime() + (now.getTimezoneOffset() * 60000);
            const istOffset = 5.5 * 60 * 60 * 1000;
            const istTime = new Date(utcTime + istOffset);
            const hours = istTime.getHours();
            const minutes = istTime.getMinutes();
            const timeDecimal = hours + (minutes / 60);

            // Time Range: 8:30 AM (8.5) to 6:00 PM (18.0)
            const isIndianTime = timeDecimal >= 8.5 && timeDecimal < 18.0;

            // Symbols
            let topLeftSymbol, bottomLeftSymbol;

            if (isIndianTime) {
                topLeftSymbol = "BSE:SENSEX";
                bottomLeftSymbol = "NSE:TMB"; 
            } else {
                topLeftSymbol = "NASDAQ:NDX";
                bottomLeftSymbol = "TVC:US10Y";
            }

            const topRightSymbol = "OANDA:XAUUSD";
            const bottomRightSymbol = "BINANCE:BTCUSDT";

            // Inject
            createWidget("tl-container", topLeftSymbol, isIndianTime ? "Sensex" : "Nasdaq 100");
            createWidget("tr-container", topRightSymbol, "Gold");
            createWidget("bl-container", bottomLeftSymbol, isIndianTime ? "TMB" : "US 10Y Yield");
            createWidget("br-container", bottomRightSymbol, "Bitcoin");
        }

        initDashboard();
    </script>
</body>
</html>
