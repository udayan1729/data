<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market</title>
<style>
    body{background:#000;color:#fff;font-family:'Courier New',monospace;margin:0;height:100vh;overflow:hidden}
    .w{position:fixed;padding:20px}
    .l{font-size:24px;color:#666;font-weight:bold;letter-spacing:2px;text-transform:uppercase}
    .p{font-size:96px;font-weight:bold;line-height:1;transition:color .5s;color:#fff}
    
    /* Yields/Smaller numbers */
    .sm{font-size:50px;margin-top:5px}
    
    /* Index Percentage: Smaller, Right Aligned */
    .sub{font-size:30px;text-align:right;margin-top:5px;font-weight:normal;opacity:0.9}

    .row{display:flex;gap:40px}
    .g{color:#0ecb81!important} .r{color:#f6465d!important} .y{color:#FFD700!important}
    
    /* Added cursor pointers for clickable areas */
    #tl{top:10px;left:30px;cursor:pointer;user-select:none;} 
    #tr{top:10px;right:30px;text-align:right;cursor:pointer;user-select:none;}
    #bl{bottom:10px;left:30px;cursor:pointer;user-select:none;} 
    #br{bottom:10px;right:30px;text-align:right}
</style>
</head>
<body>
    <div id="tl" class="w"><div id="l-tl" class="l">...</div><div id="p-tl" class="p">...</div></div>
    <!-- Added ID to the label so JS can swap between "Gold" and "USD/INR" -->
    <div id="tr" class="w"><div id="l-tr" class="l">Gold</div><div id="p-tr" class="p y">...</div></div>
    <div id="bl" class="w">
        <div id="bx-tmb"><div class="l">TMB</div><div id="p-tmb" class="p">...</div></div>
        <div id="bx-yld" class="row" style="display:none">
            <div><div class="l">10Y</div><div id="p-10" class="p sm">...</div></div>
            <div><div class="l">30Y</div><div id="p-30" class="p sm">...</div></div>
        </div>
    </div>
    <div id="br" class="w"><div class="l">Bitcoin</div><div id="p-btc" class="p">...</div></div>

<script>
    const H={}, q=i=>document.getElementById(i);
    const P=(i,t,c)=>{let e=q(i);e.innerText=t;if(c)e.className=c;};

    // Wake Lock
    const L=async()=>{try{await navigator.wakeLock.request('screen')}catch(e){}};
    L(); document.addEventListener('visibilitychange',()=>document.visibilityState==='visible'&&L());

    // Yahoo (Args: Symbol, ID, Decimals, SmallFont, FixedColor, IsIndex)
    async function Y(s, i, dec, sm, fixColor, idx) {
        try {
            let targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${s}?interval=1d&t=${Date.now()}`;
            let r = await fetch('https://corsproxy.io/?' + encodeURIComponent(targetUrl));
            
            let d = await r.json(), M = d.chart.result[0].meta;
            let p = M.regularMarketPrice, prev = M.chartPreviousClose;
            let txt = p.toLocaleString('en-US',{minimumFractionDigits:dec?2:0, maximumFractionDigits:dec?2:0});
            
            // 1. Fixed Color bypass (Gold & USD/INR)
            if(fixColor) return P(i, txt);

            // 2. Index (Nasdaq/Nifty)
            if(idx) {
                let pct = ((p - prev) / prev) * 100;
                let sign = pct >= 0 ? "+" : "";
                
                q(i).innerHTML = `${txt}<div class="sub">(${sign}${pct.toFixed(2)}%)</div>`;
                q(i).className = `p ${p >= prev ? 'g' : 'r'}`;
                return;
            }

            // 3. Others (History based color)
            let n = Date.now();
            H[s] = (H[s]||[]).filter(x => n-x.t < 1.2e6); // Keep 20m
            H[s].push({t:n, p});
            let old = H[s].find(x => n-x.t >= 9e5); // Find 15m
            P(i, txt, `p ${sm?'sm':''} ${p>=(old?old.p:prev) ? 'g' : 'r'}`);
        } catch(e){}
    }

    // Bitcoin
    async function B() {
        try {
            let [k, t] = await Promise.all([
                fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=16').then(r=>r.json()),
                fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT').then(r=>r.json())
            ]);
            let p = parseFloat(t.price), ref = parseFloat(k[0][4]);
            P('p-btc', Math.round(p).toLocaleString(), `p ${p>ref?'g':'r'}`);
        } catch(e){}
    }

    const getIST = () => {
        let n=new Date(), u=n.getTime()+n.getTimezoneOffset()*6e4+198e5, d=new Date(u);
        let m=d.getHours()*60+d.getMinutes();
        return m>=510&&m<=1080;
    };

    // State trackers: mTR=false is Gold (default), mTR=true is USD/INR
    let mTL = null, mBL = null, mTR = false;

    // Loop
    function run() {
        let ist = getIST();
        let stateTL = mTL !== null ? mTL : ist;
        let stateBL = mBL !== null ? mBL : ist;

        // Top Left: Nifty / Nasdaq
        P('l-tl', stateTL ? 'Nifty' : 'Nasdaq');
        Y(stateTL ? '^NSEI' : '^IXIC', 'p-tl', 0, 0, 0, 1); 
        
        // Top Right: Gold / USD-INR Toggle
        P('l-tr', mTR ? 'USD/INR' : 'Gold');
        // Passing 1 for dec if USD/INR (to get decimals like 83.45), 0 for Gold
        Y(mTR ? 'INR=X' : 'GC=F', 'p-tr', mTR ? 1 : 0, 0, 1);

        // Bottom Left: TMB / Yields
        q('bx-tmb').style.display = stateBL ? 'block' : 'none';
        q('bx-yld').style.display = stateBL ? 'none' : 'flex';
        
        if(stateBL) Y('TMB.NS', 'p-tmb', 1, 0, 0); 
        else { Y('^TNX', 'p-10', 1, 1, 0); Y('^TYX', 'p-30', 1, 1, 0); }
    }

    // Click Listeners
    q('tl').onclick = () => { 
        mTL = !(mTL !== null ? mTL : getIST()); 
        q('p-tl').innerHTML = '...'; 
        run(); 
    };

    q('tr').onclick = () => { 
        mTR = !mTR; 
        q('p-tr').innerText = '...'; 
        run(); 
    };

    q('bl').onclick = () => { 
        mBL = !(mBL !== null ? mBL : getIST());
        q('p-tmb').innerText = '...'; q('p-10').innerText = '...'; q('p-30').innerText = '...';
        run(); 
    };

    setInterval(run, 30000); run();
    setInterval(B, 1000);    B();
</script>
</body>
</html>
