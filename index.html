<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Dashboard</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace; 
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .corner-widget {
            position: fixed;
            padding: 10px;
        }

        /* LABEL STYLING */
        .label {
            font-size: 16px; /* Slightly larger label to match new size */
            color: #888;
            margin-bottom: 5px;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* PRICE STYLING */
        .price {
            /* INCREASED SIZE HERE */
            font-size: 60px; 
            font-weight: bold;
            line-height: 1; /* Tighter spacing */
        }

        /* POSITIONING */
        #top-left { top: 20px; left: 20px; }
        #top-right { top: 20px; right: 20px; text-align: right; }
        #bottom-left { bottom: 20px; left: 20px; }
        #bottom-right { bottom: 20px; right: 20px; text-align: right; }

        .loading { color: #555; font-size: 30px; }
    </style>
</head>
<body>

    <!-- TOP LEFT: NIFTY 50 -->
    <div id="top-left" class="corner-widget">
        <div class="label">Nifty</div>
        <div id="nifty-price" class="price loading">Loading...</div>
    </div>

    <!-- TOP RIGHT: GOLD -->
    <div id="top-right" class="corner-widget">
        <div class="label">Gold</div>
        <div id="gold-price" class="price loading">Loading...</div>
    </div>

    <!-- BOTTOM LEFT: TMB -->
    <div id="bottom-left" class="corner-widget">
        <div class="label">TMB</div>
        <div id="tmb-price" class="price loading">Loading...</div>
    </div>

    <!-- BOTTOM RIGHT: BITCOIN -->
    <div id="bottom-right" class="corner-widget">
        <div class="label">Bitcoin</div>
        <div id="btc-price" class="price loading">Loading...</div>
    </div>

    <script>
        // ---------------------------------------------------------
        // FUNCTION TO FETCH DATA
        // showDecimals: true = 123.45, false = 123
        // ---------------------------------------------------------
        async function fetchStockPrice(symbol, elementId, showDecimals) {
            
            // Yahoo Finance API URL
            const yahooURL = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d`;
            
            // Proxy to bypass CORS
            const proxyURL = 'https://corsproxy.io/?' + encodeURIComponent(yahooURL);

            try {
                const response = await fetch(proxyURL);
                const data = await response.json();
                
                // Extract price
                const result = data.chart.result[0];
                const price = result.meta.regularMarketPrice;

                // Setup formatting options
                // REMOVED 'style: currency' so symbols ($/₹) do not appear
                let formatOptions = {
                    style: 'decimal' 
                };

                if (!showDecimals) {
                    // Remove fractions for Nifty, Gold, BTC
                    formatOptions.maximumFractionDigits = 0;
                    formatOptions.minimumFractionDigits = 0;
                } else {
                    // Keep standard 2 decimals for TMB
                    formatOptions.maximumFractionDigits = 2;
                    formatOptions.minimumFractionDigits = 2;
                }
                
                // Update HTML
                const element = document.getElementById(elementId);
                element.innerText = price.toLocaleString('en-US', formatOptions);
                element.classList.remove('loading');
                
            } catch (error) {
                console.error("Error fetching " + symbol, error);
            }
        }

        // ---------------------------------------------------------
        // UPDATE FUNCTION
        // ---------------------------------------------------------
        function updateDashboard() {
            // Nifty: No Decimals (false)
            fetchStockPrice('^NSEI', 'nifty-price', false); 
            
            // Gold: No Decimals (false)
            fetchStockPrice('GC=F', 'gold-price', false);   
            
            // TMB: YES Decimals (true)
            fetchStockPrice('TMB.NS', 'tmb-price', true);   
            
            // Bitcoin: No Decimals (false)
            fetchStockPrice('BTC-USD', 'btc-price', false); 
        }

        // Run on load
        updateDashboard();

        // Update every 10 seconds
        setInterval(updateDashboard, 10000);

    </script>

</body>
</html>
