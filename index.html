<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market</title>
<style>
    body{background:#000;color:#fff;font-family:'Courier New',monospace;margin:0;height:100vh;overflow:hidden}
    .w{position:fixed;padding:20px}
    .l{font-size:24px;color:#666;font-weight:bold;letter-spacing:2px;text-transform:uppercase}
    .p{font-size:96px;font-weight:bold;line-height:1;transition:color .5s;color:#fff}
    .sm{font-size:50px;margin-top:5px}
    .row{display:flex;gap:40px}
    .g{color:#0ecb81!important} .r{color:#f6465d!important} .y{color:#FFD700!important}
    #tl{top:10px;left:30px} #tr{top:10px;right:30px;text-align:right}
    #bl{bottom:10px;left:30px} #br{bottom:10px;right:30px;text-align:right}
</style>
</head>
<body>
    <div id="tl" class="w"><div id="l-tl" class="l">...</div><div id="p-tl" class="p">...</div></div>
    <div id="tr" class="w"><div class="l">Gold</div><div id="p-gd" class="p y">...</div></div>
    <div id="bl" class="w">
        <div id="bx-tmb"><div class="l">TMB</div><div id="p-tmb" class="p">...</div></div>
        <div id="bx-yld" class="row" style="display:none">
            <div><div class="l">10Y</div><div id="p-10" class="p sm">...</div></div>
            <div><div class="l">30Y</div><div id="p-30" class="p sm">...</div></div>
        </div>
    </div>
    <div id="br" class="w"><div class="l">Bitcoin</div><div id="p-btc" class="p">...</div></div>

<script>
    const H={}, q=i=>document.getElementById(i);
    const P=(i,t,c)=>{let e=q(i);e.innerText=t;if(c)e.className=c;};

    // Wake Lock
    const L=async()=>{try{await navigator.wakeLock.request('screen')}catch(e){}};
    L(); document.addEventListener('visibilitychange',()=>document.visibilityState==='visible'&&L());

    // Yahoo (Args: Symbol, ID, Decimals, SmallFont, Gold)
    async function Y(s, i, dec, sm, gd) {
        try {
            let r = await fetch('https://corsproxy.io/?'+encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${s}?interval=1d`));
            let d = await r.json(), M = d.chart.result[0].meta;
            let p = M.regularMarketPrice, prev = M.chartPreviousClose;
            let txt = p.toLocaleString('en-US',{minimumFractionDigits:dec?2:0, maximumFractionDigits:dec?2:0});
            if(gd) return P(i, txt);

            let n = Date.now();
            H[s] = (H[s]||[]).filter(x => n-x.t < 1.2e6); // Keep 20m
            H[s].push({t:n, p});
            let old = H[s].find(x => n-x.t >= 9e5); // Find 15m
            
            // Color: compare to 15m ago, or Prev Close if no history
            P(i, txt, `p ${sm?'sm':''} ${p>=(old?old.p:prev) ? 'g' : 'r'}`);
        } catch(e){}
    }

    // Bitcoin (100ms)
    async function B() {
        try {
            let [k, t] = await Promise.all([
                fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=16').then(r=>r.json()),
                fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT').then(r=>r.json())
            ]);
            let p = parseFloat(t.price), ref = parseFloat(k[0][4]);
            P('p-btc', Math.round(p).toLocaleString(), `p ${p>ref?'g':'r'}`);
        } catch(e){}
    }

    // Main Loop (5000ms)
    function run() {
        let n=new Date(), u=n.getTime()+n.getTimezoneOffset()*6e4+198e5, d=new Date(u);
        let m=d.getHours()*60+d.getMinutes(), ist=m>=510&&m<=1080;

        P('l-tl', ist ? 'Nifty' : 'Nasdaq');
        Y(ist ? '^NSEI' : '^IXIC', 'p-tl', 0, 0, 0);
        Y('GC=F', 'p-gd', 0, 0, 1);

        q('bx-tmb').style.display = ist ? 'block' : 'none';
        q('bx-yld').style.display = ist ? 'none' : 'flex';
        
        // TMB: Decimals=True, Small=False (Big)
        if(ist) Y('TMB.NS', 'p-tmb', 1, 0, 0); 
        // Yields: Decimals=True, Small=True
        else { Y('^TNX', 'p-10', 1, 1, 0); Y('^TYX', 'p-30', 1, 1, 0); }
    }

    setInterval(run, 5000); run(); // Slow loop
    setInterval(B, 100);    B();   // Fast loop
</script>
</body>
</html>
