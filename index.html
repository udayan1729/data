<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market</title>
<style>
    /* BASE STYLES */
    body {
        background: #000;
        color: #fff;
        font-family: 'Courier New', monospace;
        margin: 0;
        height: 100vh;
        height: 100dvh; /* Prevents mobile URL bar from cutting off the bottom */
        overflow: hidden;
    }
    .w { padding: 20px; cursor: pointer; user-select: none; }
    .l { font-size: 24px; color: #666; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
    .p { font-size: 96px; font-weight: bold; line-height: 1; transition: color .5s; color: #fff; }

    .sm { font-size: 50px; margin-top: 5px; }
    .sub { font-size: 30px; margin-top: 5px; font-weight: normal; opacity: 0.9; }

    .row { display: flex; gap: 40px; }
    .g { color: #0ecb81!important; }
    .r { color: #f6465d!important; }
    .y { color: #FFD700!important; }

    /* HORIZONTAL LAYOUT (Default Desktop & Landscape) */
    .w { position: fixed; }
    #tl { top: 10px; left: 30px; }
    #tr { top: 10px; right: 30px; text-align: right; }
    #bl { bottom: 10px; left: 30px; }
    #br { bottom: 10px; right: 30px; text-align: right; }

    /* Fix subtext alignment based on placement */
    #tl .sub, #bl .sub { text-align: left; }
    #tr .sub, #br .sub { text-align: right; }

    /* VERTICAL LAYOUT (Portrait Mode on Phones) */
    @media (orientation: portrait) {
        body {
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
        }
        .w {
            position: static;
            padding: 0;
            width: 100%;
            text-align: center !important;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* Dynamic viewport width sizing so it never overlaps edges */
        .l { font-size: 5vw; }
        .p { font-size: 16vw; }
        .sm { font-size: 12vw; }
        .sub { font-size: 5vw; text-align: center !important; }
        .row { justify-content: center; gap: 10vw; }
    }

    /* RESPONSIVE LANDSCAPE (For sideways phones so fonts aren't too massive) */
    @media (orientation: landscape) and (max-height: 600px) {
        .w { padding: 15px; }
        .l { font-size: 4vh; }
        .p { font-size: 18vh; }
        .sm { font-size: 12vh; }
        .sub { font-size: 6vh; }
        .row { gap: 4vw; }
    }
</style>
</head>
<body>
    <div id="tl" class="w"><div id="l-tl" class="l">...</div><div id="p-tl" class="p">...</div></div>

    <div id="tr" class="w"><div id="l-tr" class="l">Gold</div><div id="p-tr" class="p y">...</div></div>

    <div id="bl" class="w">
        <div id="bx-tmb"><div class="l">TMB</div><div id="p-tmb" class="p">...</div></div>
        <div id="bx-yld" class="row" style="display:none">
            <div><div class="l">10Y</div><div id="p-10" class="p sm">...</div></div>
            <div><div class="l">30Y</div><div id="p-30" class="p sm">...</div></div>
        </div>
    </div>

    <div id="br" class="w"><div id="l-btc" class="l">Bitcoin</div><div id="p-btc" class="p">...</div></div>

<script>
    const REFRESH_MS = 30_000;
    const BTC_REF_REFRESH_MS = 60_000;  // refresh reference price every 60s
    const BTC_WS_RECONNECT_MS = 5_000;
    const HISTORY_WINDOW_MS = 20 * 60_000;   // 20 min window for price history
    const HISTORY_COMPARE_MS = 15 * 60_000;  // compare against 15 min ago
    const IST_MARKET_OPEN = 510;   // 8:30 AM in minutes
    const IST_MARKET_CLOSE = 1080; // 6:00 PM in minutes
    const BTC_DOM_ADJUSTMENT = 1.04325;

    const YAHOO_MODE = { CHANGE_PCT: 1, CHANGE_ABS: 2 };

    const priceHistory = {};
    const $ = id => document.getElementById(id);

    function setPrice(id, text, className) {
        const el = $(id);
        el.textContent = text;
        if (className) el.className = className;
    }

    function setPriceWithSub(id, priceText, subText, isUp) {
        const el = $(id);
        el.textContent = '';
        el.appendChild(document.createTextNode(priceText));
        const sub = document.createElement('div');
        sub.className = 'sub';
        sub.textContent = subText;
        el.appendChild(sub);
        el.className = `p ${isUp ? 'g' : 'r'}`;
    }

    // Wake Lock
    async function requestWakeLock() {
        try { await navigator.wakeLock.request('screen'); }
        catch { /* unsupported or denied */ }
    }
    requestWakeLock();
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') requestWakeLock();
    });

    function isISTMarketHours() {
        const ist = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Kolkata' }));
        const minutes = ist.getHours() * 60 + ist.getMinutes();
        return minutes >= IST_MARKET_OPEN && minutes <= IST_MARKET_CLOSE;
    }

    function formatNumber(value, decimals) {
        return value.toLocaleString('en-US', {
            minimumFractionDigits: decimals,
            maximumFractionDigits: decimals,
        });
    }

    async function fetchTreasury(symbol, id) {
        try {
            const res = await fetch(`https://quote.cnbc.com/quote-html-webservice/restQuote/symbolType/symbol?symbols=${symbol}&requestMethod=itv&no498498=1&partnerId=2&fund=1&exthrs=1&output=json`);
            const data = await res.json();
            const quote = data.FormattedQuoteResult.FormattedQuote[0];
            const yield_ = parseFloat(quote.last);
            const prevClose = parseFloat(quote.previous_day_closing);
            setPrice(id, yield_.toFixed(2), `p sm ${yield_ >= prevClose ? 'g' : 'r'}`);
        } catch (err) {
            console.warn(`CNBC fetch failed for ${symbol}:`, err);
        }
    }

    async function fetchYahoo(symbol, id, { decimals = 0, small = false, fixedColor = false, mode = 0 } = {}) {
        try {
            const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&t=${Date.now()}`;
            const res = await fetch('https://corsproxy.io/?' + encodeURIComponent(targetUrl));
            const data = await res.json();
            const meta = data.chart.result[0].meta;
            const price = meta.regularMarketPrice;
            const prevClose = meta.chartPreviousClose;
            const text = formatNumber(price, decimals ? 2 : 0);

            if (fixedColor) return setPrice(id, text);

            if (mode) {
                const diff = price - prevClose;
                const sign = diff >= 0 ? '+' : '';

                let subText;
                if (mode === YAHOO_MODE.CHANGE_PCT) {
                    const pct = (diff / prevClose * 100).toFixed(2);
                    subText = `${sign}${diff.toFixed(2)} (${sign}${pct}%)`;
                } else {
                    subText = `(${sign}${diff.toFixed(2)})`;
                }

                setPriceWithSub(id, text, subText, diff >= 0);
                return;
            }

            const now = Date.now();
            priceHistory[symbol] = (priceHistory[symbol] || []).filter(x => now - x.t < HISTORY_WINDOW_MS);
            priceHistory[symbol].push({ t: now, p: price });
            const older = priceHistory[symbol].find(x => now - x.t >= HISTORY_COMPARE_MS);
            const ref = older ? older.p : prevClose;
            setPrice(id, text, `p ${small ? 'sm' : ''} ${price >= ref ? 'g' : 'r'}`);
        } catch (err) {
            console.warn(`Yahoo fetch failed for ${symbol}:`, err);
        }
    }

    let overrideTL = null, overrideBL = null, toggleTR = false, toggleBR = false;
    let btcDominance = '...';

    async function fetchBtcDominance() {
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/global');
            const data = await res.json();
            btcDominance = (parseFloat(data.data.market_cap_percentage.btc) * BTC_DOM_ADJUSTMENT).toFixed(2) + '%';
            if (toggleBR) setPrice('p-btc', btcDominance);
        } catch (err) {
            console.warn('CoinGecko fetch failed:', err);
        }
    }

    let btcRefPrice = null;
    let btcWs = null;

    async function fetchBtcRefPrice() {
        try {
            const klines = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=16').then(r => r.json());
            btcRefPrice = parseFloat(klines[0][4]);
        } catch (err) {
            console.warn('Binance klines fetch failed:', err);
        }
    }

    function connectBtcWebSocket() {
        if (btcWs) { btcWs.close(); btcWs = null; }
        if (toggleBR) return;

        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@miniTicker');
        btcWs = ws;

        ws.onmessage = (e) => {
            if (toggleBR) return;
            const price = parseFloat(JSON.parse(e.data).c); // miniTicker uses 'c' for close price
            const ref = btcRefPrice ?? price;
            setPrice('p-btc', Math.round(price).toLocaleString(), `p ${price >= ref ? 'g' : 'r'}`);
        };

        ws.onclose = () => {
            if (btcWs === ws && !toggleBR) {
                setTimeout(connectBtcWebSocket, BTC_WS_RECONNECT_MS);
            }
        };

        ws.onerror = () => ws.close();
    }

    function showBtcView() {
        if (toggleBR) {
            setPrice('l-btc', 'BTC Dom');
            setPrice('p-btc', btcDominance, 'p y');
            if (btcWs) { btcWs.close(); btcWs = null; }
        } else {
            setPrice('l-btc', 'Bitcoin');
            connectBtcWebSocket();
        }
    }

    function run() {
        const ist = isISTMarketHours();
        const showIndianTL = overrideTL !== null ? overrideTL : ist;
        const showIndianBL = overrideBL !== null ? overrideBL : ist;

        setPrice('l-tl', showIndianTL ? 'Nifty' : 'Nasdaq');
        fetchYahoo(showIndianTL ? '^NSEI' : '^IXIC', 'p-tl', { mode: YAHOO_MODE.CHANGE_PCT });

        setPrice('l-tr', toggleTR ? 'USD/INR' : 'Gold');
        fetchYahoo(toggleTR ? 'INR=X' : 'GC=F', 'p-tr', { decimals: toggleTR ? 1 : 0, fixedColor: true });

        $('bx-tmb').style.display = showIndianBL ? 'block' : 'none';
        $('bx-yld').style.display = showIndianBL ? 'none' : 'flex';

        if (showIndianBL) {
            fetchYahoo('TMB.NS', 'p-tmb', { decimals: 1, mode: YAHOO_MODE.CHANGE_ABS });
        } else {
            fetchTreasury('US10Y', 'p-10');
            fetchTreasury('US30Y', 'p-30');
        }
    }

    $('tl').onclick = () => { overrideTL = !(overrideTL !== null ? overrideTL : isISTMarketHours()); $('p-tl').textContent = '...'; run(); };
    $('tr').onclick = () => { toggleTR = !toggleTR; $('p-tr').textContent = '...'; run(); };
    $('bl').onclick = () => { overrideBL = !(overrideBL !== null ? overrideBL : isISTMarketHours()); $('p-tmb').textContent = '...'; $('p-10').textContent = '...'; $('p-30').textContent = '...'; run(); };
    $('br').onclick = () => { toggleBR = !toggleBR; $('p-btc').textContent = '...'; showBtcView(); };

    setInterval(run, REFRESH_MS); run();
    fetchBtcRefPrice(); setInterval(fetchBtcRefPrice, BTC_REF_REFRESH_MS);
    showBtcView();
    setInterval(fetchBtcDominance, REFRESH_MS); fetchBtcDominance();
</script>
</body>
</html>
